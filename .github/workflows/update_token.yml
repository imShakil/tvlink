name: Update Stream Tokens

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours
  workflow_dispatch:          # Allow manual trigger

permissions:
  contents: write

jobs:
  update-tokens:
    runs-on: self-hosted
    env:
      JSON_FILE: "features.json"
    outputs:
      updated: ${{ steps.set-output-updated.outputs.updated }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      # - name: Install dependencies
      #   run: sudo apt-get install -y curl jq

      - name: Run update script
        env:
          PLAY_URL: ${{ secrets.PLAY_URL }}
          REFERER: ${{ secrets.REFERER }}
          SPOOF_IP: ${{ secrets.SPOOF_IP }}
        run: |
          chmod +x autorun.sh
          ./autorun.sh $JSON_FILE

      - name: Commit updated tokens
        run: |
          set -x
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --local commit.gpgsign false
          git add $JSON_FILE
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh stream tokens [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Job summary
        run: |
          echo "## Token Refresh Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Updated | $COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed  | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Set output if updated
        id: set-output-updated
        run: |
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

  remove_token_channels:
    runs-on: ubuntu-latest
    needs: update-tokens
    if: failure() || needs.update-tokens.outputs.updated == 'false'  # Run if update-tokens fails or no tokens updated
    env:
      JSON_FILE: "features.json"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Remove token-based channels
        run: |
          jq 'if .channels then .channels |= map(select((.source | test("103.89.248|bdiptv") | not)) ) else . end' "$JSON_FILE" > filtered.json
          mv filtered.json "$JSON_FILE"

      - name: Commit removal of token-based channels
        run: |
          set -x
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --local commit.gpgsign false
          git add $JSON_FILE
          if git diff --cached --quiet; then
            echo "No token-based channels to remove."
          else
            git commit -m "chore: remove token-based channels after update failure [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
